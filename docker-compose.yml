version: '3.8'
services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  app:
    build: .
    container_name: local-assistant
    depends_on:
      - ollama
    volumes:
      - .:/app
    ports:
      - "7860:7860"
    environment:
      - OLLAMA_HOST=http://ollama:11434
